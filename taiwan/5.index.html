<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #5285ac;
            overflow: hidden;
        }
        
        .image-container {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: stretch;
            align-items: stretch;
            overflow: hidden;
            gap: 0;
            margin: 0;
            padding: 0;
        }
        
        .image-wrapper {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin: 0;
            padding: 0;
            line-height: 0;
        }
        
        img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        
        footer {
            background-color: #003366;
            color: white;
            padding: 20px;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        footer p {
            margin: 0;
            color: white;
        }
        
        .footer-btn {
            background-color: #005580;
            color: white;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
            transition: all 0.3s ease;
            border-radius: 0;
        }
        
        .footer-btn:hover {
            background-color: #214f72;
            transform: scale(1.05);
        }
         @media (max-width: 768px) {
            .button-row {
                gap: 15px;
            }
            
            .btn {
                min-width: 90%;
                max-width: 400px;
                padding: 18px 36px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="image-container">
        <div class="image-wrapper">
            <img src="p6.png" alt="圖片">
        </div>
    </div>

     <!-- Footer -->
    <footer>
        <a href="https://jy1027.github.io/taiwan/" class="footer-btn" target="_blank">上一頁</a>
    </footer>
</body>

</html>
